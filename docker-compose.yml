# ─── YELAVE ERP - Docker Compose ──────────────────────────────────────
# Configuración para despliegue en producción
# ──────────────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yelave-erp
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - PYTHONUNBUFFERED=1
      - "ODBC_DRIVER={ODBC Driver 18 for SQL Server}"
      - ATTACHMENTS_ROOT=/app/gestion-ylv
      - FILE_SERVER=${FILE_SERVER:-//192.168.1.200/gestion-ylv}
      - FILE_USER=${FILE_USER:-juber_doc}
      - FILE_PASSWORD=${FILE_PASSWORD:-A123456789a}
    volumes:
      - ./backend:/app/backend
      - ./dashboard-prototype:/app/dashboard-prototype
      - conciliacion_data:/app/backend/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    cap_add:
      - SYS_ADMIN
    privileged: true
    networks:
      - yelave-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/db')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  conciliacion_data:

networks:
  yelave-network:
    driver: bridge
