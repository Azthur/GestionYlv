<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YELAVE - Módulo Contable</title>
    <meta name="description" content="Módulo Contable - Compras SUNAT, Registro de Facturas y Trazabilidad">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contabilidad.css">
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
    <script src="auth-guard.js"></script>
</head>
<body>
    <div class="app-container">
<!-- Sidebar -->
<!-- Main Content -->
        <main class="main-content">
<section class="content fade-in">
                <!-- Empresa Selector -->
                <div class="cnt-sync-bar" style="margin-bottom:1rem;">
                    <div class="filter-group" style="flex:2;">
                        <label for="cntEmpresa">Empresa</label>
                        <select id="cntEmpresa"><option value="" disabled selected>Cargando empresas...</option></select>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="cnt-tabs">
                    <button class="cnt-tab-btn active" onclick="switchTab('compras')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        Compras SUNAT
                    </button>
                    <button class="cnt-tab-btn" onclick="switchTab('tokens')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Configuración Tokens
                    </button>
                </div>

                <!-- ═══════ TAB 1: COMPRAS SUNAT ═══════ -->
                <div class="cnt-tab-panel active" id="panelCompras">
                    <div class="cnt-sync-bar">
                        <div class="filter-group" style="flex:1;">
                            <label for="syncPeriodo">Periodo</label>
                            <input type="text" id="syncPeriodo" placeholder="202509" maxlength="6" style="font-family:monospace;">
                        </div>
                        <div class="filter-group" style="flex:0.75;">
                            <label>&nbsp;</label>
                            <button class="btn btn-primary" onclick="syncCompras()" id="btnSync" style="height:36px; padding:0 1.25rem; font-size:0.8rem;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" style="margin-right:0.4rem">
                                    <polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                                </svg>Sincronizar
                            </button>
                        </div>
                        <div class="filter-group" style="flex:0.75;">
                            <label>&nbsp;</label>
                            <button class="btn btn-outline" onclick="enrichBatch()" id="btnEnrich" style="height:36px; padding:0 1rem; font-size:0.78rem; border-color:#8b5cf6; color:#8b5cf6;" title="Descargar XML completo de cada comprobante del periodo">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="margin-right:0.3rem">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>Enriquecer XML
                            </button>
                        </div>
                        <div class="filter-group" style="flex:1;">
                            <label for="comprasFilterProv">Filtrar Proveedor</label>
                            <input type="text" id="comprasFilterProv" placeholder="RUC o Nombre..." onkeyup="if(event.key==='Enter')loadCompras()">
                        </div>
                        <div class="filter-group" style="flex:0.5;">
                            <label>&nbsp;</label>
                            <button class="btn btn-outline" onclick="loadCompras()" style="height:36px; padding:0 1rem; font-size:0.8rem;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="margin-right:0.3rem">
                                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                </svg>Buscar
                            </button>
                        </div>
                    </div>

                    <div class="card glass-panel" style="padding: 1.25rem;">
                        <div id="comprasTableWrapper" style="overflow-x:auto;">
                            <table id="comprasTable" class="display nowrap" style="width:100%">
                                <thead>
                                    <tr>
                                        <th>Tipo</th><th>Serie-Número</th><th>F. Emisión</th>
                                        <th>Proveedor</th><th>RUC Prov.</th><th>Moneda</th>
                                        <th>Base Imp.</th><th>IGV</th><th>Total</th>
                                        <th>OC Vinculada</th><th>URL Factura</th>
                                        <th>XML (Ítems)</th><th>Registro ERP</th><th>Est. SUNAT</th>
                                    </tr>
                                </thead>
                                <tbody id="comprasTbody">
                                    <tr><td colspan="14" style="text-align:center;padding:3rem;color:var(--text-muted);">Seleccione empresa y periodo para sincronizar</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>


                <!-- ═══════ TAB 3: TOKENS CONFIG ═══════ -->
                <div class="cnt-tab-panel" id="panelTokens">
                    <div class="card glass-panel" style="padding:1.25rem; margin-bottom:1.25rem;">
                        <h4 class="cnt-section-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Agregar / Editar Token
                        </h4>
                        <div class="cnt-invoice-form" style="grid-template-columns: repeat(3, 1fr);">
                            <div class="form-field">
                                <label>Empresa (CodCia)</label>
                                <select id="tokCodCia"><option value="" disabled selected>Seleccione...</option></select>
                            </div>
                            <div class="form-field">
                                <label>RUC Empresa</label>
                                <input type="text" id="tokRuc" maxlength="11" placeholder="20600453271">
                            </div>
                            <div class="form-field">
                                <label>Nombre Empresa</label>
                                <input type="text" id="tokNomEmpresa" placeholder="DATASERVER PERU SAC">
                            </div>
                            <div class="form-field">
                                <label>Token MisCompras</label>
                                <input type="text" id="tokMisCompras" placeholder="Token para API miscompras" style="font-family:monospace; font-size:0.75rem;">
                            </div>
                            <div class="form-field">
                                <label>Token DatosCPE</label>
                                <input type="text" id="tokDatosCpe" placeholder="Token para API datoscperecibido" style="font-family:monospace; font-size:0.75rem;">
                            </div>
                            <div class="form-field">
                                <label>Token Corporativo</label>
                                <input type="text" id="tokCorpo" placeholder="Token corporativo" style="font-family:monospace; font-size:0.75rem;">
                            </div>
                        </div>
                        <div style="display:flex; justify-content:flex-end; margin-top:1rem;">
                            <button class="btn btn-primary" onclick="saveToken()" style="padding:0.5rem 1.5rem;">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" style="margin-right:0.3rem"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline></svg>
                                Guardar Token
                            </button>
                        </div>
                    </div>

                    <h4 class="cnt-section-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Tokens Registrados
                    </h4>
                    <div class="cnt-token-grid" id="tokenGrid">
                        <div style="text-align:center; padding:3rem; color:var(--text-muted); grid-column:1/-1;">Cargando tokens...</div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <!-- Modal: Factura Detail -->
    <div class="modal-overlay" id="facturaDetailModal">
        <div class="modal glass-modal" style="max-width:850px; width:95%;">
            <div class="modal-header">
                <h3>Detalle de Factura <span id="facturaDetailTitle" style="color:var(--primary)"></span></h3>
                <button class="close-btn" onclick="closeFacturaDetail()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body" id="facturaDetailBody" style="max-height:75vh; overflow-y:auto;">
                <div style="text-align:center; padding:3rem; color:var(--text-muted);">Cargando...</div>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- jQuery + DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/dataTables.buttons.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.2/js/buttons.html5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <script src="contabilidad.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
