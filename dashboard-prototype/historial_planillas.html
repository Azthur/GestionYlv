<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Planillas - YELAVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css"/>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth-guard.js"></script>
</head>
<body>
    <div class="app-container">
<main class="main-content" style="padding: 2rem;">
            <div class="card-panel" style="padding: 2rem 3rem; border-radius: 8px; width: 100%;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <div>
                        <h2 style="font-size:1.6rem; font-weight:800; color:#1e293b; margin:0;">📋 MI HISTORIAL DE PLANILLAS DE MOVILIDAD</h2>
                        <div style="font-size:0.85rem; color:#64748b; margin-top:5px;">Planillas registradas por mi usuario — Exportable a Excel y PDF.</div>
                    </div>
                    <a href="/planilla_movilidad.html" style="background:#2563eb; color:white; padding:10px 20px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:0.85rem;">+ Nueva Planilla</a>
                </div>

                <div class="filter-bar" style="padding:12px; margin-bottom:20px; display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <label style="font-weight:700; color:#334155;">EMPRESA:</label>
                        <select id="selFiltroCia" onchange="cargarHistorial()" style="padding:8px; width:300px; border-radius:4px; border:1px solid #cbd5e1; font-family:'Inter',sans-serif;">
                            <option value="">Seleccione empresa</option>
                        </select>
                    </div>
                    <label style="display:flex; align-items:center; gap:6px; font-weight:600; color:#334155; cursor:pointer;">
                        <input type="checkbox" id="chkTodos" onchange="cargarHistorial()" style="width:16px; height:16px; cursor:pointer;">
                        Mostrar todas las de la empresa
                    </label>
                </div>

                <table id="tablaHistorial" class="display" style="width:100%; font-size:0.85rem;">
                    <thead>
                        <tr>
                            <th>FECHA EMISIÓN</th>
                            <th>F. PER. CONTABLE</th>
                            <th>NRO PLANILLA</th>
                            <th>TRABAJADOR</th>
                            <th>TOTAL</th>
                            <th>USUARIO</th>
                            <th>ESTADO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyHistorial"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "/api";
        let tbl;

        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('yelave_token');
            if (token) config.headers.Authorization = `Bearer ${token}`;
            return config;
        });

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const res = await axios.get(`${API_URL}/permisos/empresas/me`);
                const sel = document.getElementById("selFiltroCia");
                res.data.forEach(e => {
                    const opt = document.createElement("option");
                    opt.value = e.codcia;
                    opt.textContent = `${e.codcia} - ${e.nomcia}`;
                    sel.appendChild(opt);
                });
            } catch(e) { console.error(e); }

            const cuActual = JSON.parse(localStorage.getItem('yelave_user') || '{}');
            const loginActual = String(cuActual.login || '').trim().toUpperCase();
            const isAdmin = String(cuActual.rol || '').trim().toUpperCase() === 'ADMIN' || loginActual === '71941916JL';

            const esAnulada = (row) => String(row.Estado || '').trim().toUpperCase() === 'ANULADO';

            const estadoBadge = (row) => {
                if (esAnulada(row)) {
                    return '<span style="padding:3px 8px; border-radius:4px; background:#fee2e2; color:#b91c1c; font-weight:bold; font-size:0.75rem;">ANULADO</span>';
                }
                return row.FechaAprobacion
                    ? '<span style="padding:3px 8px; border-radius:4px; background:#dcfce7; color:#166534; font-weight:bold; font-size:0.75rem;">APROBADO</span>'
                    : '<span style="padding:3px 8px; border-radius:4px; background:#fef08a; color:#854d0e; font-weight:bold; font-size:0.75rem;">PENDIENTE</span>';
            };

            const accionesHtml = (row) => {
                const url = `${window.location.origin}/visor_planilla.html?uuid=${row.UuidLink}`;
                let html = `<a href="${url}" target="_blank" style="color:#2563eb; font-weight:bold; border:1px solid #2563eb; padding:4px 8px; border-radius:4px; text-decoration:none;">👁 Ver PDF</a>`;
                if (!row.FechaAprobacion && !esAnulada(row)) {
                    html += ` <a href="/planilla_movilidad.html?id=${row.Id}" style="color:#059669; font-weight:bold; border:1px solid #059669; padding:4px 8px; border-radius:4px; text-decoration:none;">✏️ Editar</a>`;
                }
                if (isAdmin && !esAnulada(row)) {
                    const nro = String(row.NroPlanilla || '').replace(/'/g, "\\'");
                    html += ` <a href="javascript:void(0)" onclick="anularPlanilla(${row.Id}, '${nro}')" style="color:#b91c1c; font-weight:bold; border:1px solid #b91c1c; padding:4px 8px; border-radius:4px; text-decoration:none;">🚫 Anular</a>`;
                }
                return html;
            };

            tbl = $('#tablaHistorial').DataTable({
                dom: 'Bfrtip',
                buttons: ['excelHtml5', 'pdfHtml5'],
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                order: [[0, 'desc']],
                pageLength: 25,
                processing: true,
                serverSide: true,
                deferLoading: 0, // No consultar al iniciar hasta seleccionar empresa
                columns: [
                    { data: 'FechaEmision', name: 'FechaEmision', render: d => d || '' },
                    { data: 'FecPeriodoContable', name: 'FecPeriodoContable', render: d => d ? String(d).substring(0, 10) : '-' },
                    { data: 'NroPlanilla', name: 'NroPlanilla', render: d => d || '' },
                    { data: 'NomAux', name: 'NomAux', render: d => d || '' },
                    { data: 'TotalGastado', name: 'TotalGastado', render: d => `S/ ${Number(d || 0).toFixed(2)}` },
                    { data: 'UsuarioRegistro', name: 'UsuarioRegistro', render: d => d || '' },
                    { data: null, name: 'Estado', orderable: false, render: (d, t, row) => estadoBadge(row) },
                    { data: null, name: 'Acciones', orderable: false, render: (d, t, row) => accionesHtml(row) }
                ],
                ajax: function (dtParams, callback) {
                    const codcia = document.getElementById("selFiltroCia").value;
                    // Sin empresa seleccionada: no consultar ni mostrar nada
                    if (!codcia) {
                        callback({ draw: dtParams.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
                        return;
                    }
                    const cu = JSON.parse(localStorage.getItem('yelave_user') || '{}');
                    const username = String(cu.login || "SISTEMA").trim().toUpperCase();
                    const showAll = document.getElementById("chkTodos").checked;
                    const orderColIdx = dtParams.order && dtParams.order.length ? dtParams.order[0].column : 0;
                    const params = {
                        codcia,
                        draw: dtParams.draw,
                        start: dtParams.start,
                        length: dtParams.length,
                        search: dtParams.search ? dtParams.search.value : '',
                        order_col: dtParams.columns[orderColIdx].name || 'FechaEmision',
                        order_dir: dtParams.order && dtParams.order.length ? dtParams.order[0].dir : 'desc'
                    };
                    if (!showAll) params.only_user = username;

                    axios.get(`${API_URL}/finanzas/planillas/paged`, { params })
                        .then(res => callback(res.data))
                        .catch(err => {
                            console.error(err);
                            callback({ draw: dtParams.draw, recordsTotal: 0, recordsFiltered: 0, data: [] });
                        });
                }
            });
        });

        function cargarHistorial() {
            if (tbl) tbl.ajax.reload();
        }

        async function anularPlanilla(id, nro) {
            const result = await Swal.fire({
                title: '¿Anular planilla?',
                html: `Se anulará la planilla <b>${nro}</b>.<br><br>Los montos de la cabecera y del detalle quedarán en <b>0</b> y el estado cambiará a <b>ANULADO</b>.<br><span style="color:#b91c1c;">Esta acción no se puede deshacer.</span>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#b91c1c',
                cancelButtonColor: '#64748b',
                confirmButtonText: '🚫 Sí, anular',
                cancelButtonText: 'Cancelar',
                reverseButtons: true
            });
            if (!result.isConfirmed) return;

            try {
                Swal.fire({ title: 'Anulando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                await axios.post(`${API_URL}/finanzas/planillas/${id}/anular`);
                if (tbl) tbl.ajax.reload(null, false);
                Swal.fire({ icon: 'success', title: 'Planilla anulada', text: `La planilla ${nro} fue anulada correctamente.`, timer: 2000, showConfirmButton: false });
            } catch (e) {
                console.error(e);
                const msg = (e.response && e.response.data && e.response.data.detail) || 'Error al anular la planilla.';
                Swal.fire({ icon: 'error', title: 'No se pudo anular', text: msg });
            }
        }
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
