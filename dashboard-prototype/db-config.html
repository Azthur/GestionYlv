<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YELAVE - Configuración de Base de Datos</title>
    <meta name="description" content="Configuración y verificación de conexión a base de datos - YELAVE ERP">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* â”€â”€â”€ Page-specific styles â”€â”€â”€ */
        .glass-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .config-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            max-width: 1100px;
        }

        .config-card {
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .config-card-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .config-card-header h3 {
            font-size: 0.9375rem;
            font-weight: 600;
        }

        .config-card-header .icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .config-card-header .icon svg {
            width: 18px;
            height: 18px;
        }

        .config-card-header .icon.primary {
            background: #EFF6FF;
            color: var(--primary);
        }

        .config-card-header .icon.success {
            background: #ECFDF5;
            color: var(--success);
        }

        .config-card-body {
            padding: 1.5rem;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .form-field label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-field input {
            padding: 0.6rem 0.85rem;
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-sm);
            background: #FFFFFF;
            font-family: var(--font);
            font-size: 0.8125rem;
            color: var(--text-secondary);
            transition: all 0.15s ease;
        }

        .form-field input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-field input::placeholder {
            color: var(--text-muted);
        }

        .input-with-toggle {
            position: relative;
        }

        .input-with-toggle input {
            width: 100%;
            padding-right: 2.5rem;
        }

        .toggle-password {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.25rem;
            display: flex;
            align-items: center;
            border-radius: 4px;
            transition: color 0.15s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .form-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        /* Status Section */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.25rem;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.3s ease;
        }

        .status-indicator.checking {
            background: #F0F9FF;
            color: var(--info);
            border: 1px solid #BAE6FD;
        }

        .status-indicator.connected {
            background: #ECFDF5;
            color: var(--success);
            border: 1px solid #A7F3D0;
        }

        .status-indicator.disconnected {
            background: #FEF2F2;
            color: var(--danger);
            border: 1px solid #FECACA;
        }

        .status-indicator.expired {
            background: #FFFBEB;
            color: var(--warning);
            border: 1px solid #FDE68A;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.pulse {
            animation: pulse 1.5s infinite;
        }

        .checking .status-dot {
            background: var(--info);
        }

        .connected .status-dot {
            background: var(--success);
        }

        .disconnected .status-dot {
            background: var(--danger);
        }

        .expired .status-dot {
            background: var(--warning);
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.3);
                opacity: 0.6;
            }
        }

        /* Test Result */
        .test-result {
            margin-top: 1rem;
            border-radius: var(--radius-md);
            overflow: hidden;
            animation: fadeIn 0.3s ease-out;
        }

        .test-result.success {
            border: 1px solid #A7F3D0;
        }

        .test-result.error {
            border: 1px solid #FECACA;
        }

        .test-result-header {
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            font-size: 0.8125rem;
        }

        .test-result.success .test-result-header {
            background: #ECFDF5;
            color: var(--success);
        }

        .test-result.error .test-result-header {
            background: #FEF2F2;
            color: var(--danger);
        }

        .test-result-body {
            padding: 0.75rem 1rem;
            background: #FFFFFF;
            font-size: 0.8125rem;
        }

        .test-detail {
            display: flex;
            justify-content: space-between;
            padding: 0.35rem 0;
            border-bottom: 1px solid var(--border);
        }

        .test-detail:last-child {
            border-bottom: none;
        }

        .test-detail .label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .test-detail .value {
            color: var(--text-primary);
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.85rem 1.25rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            font-size: 0.8125rem;
            font-weight: 500;
            min-width: 300px;
            max-width: 450px;
            animation: slideIn 0.3s ease-out;
            border: 1px solid;
        }

        .toast.success {
            background: #ECFDF5;
            color: var(--success);
            border-color: var(--success);
        }

        .toast.error {
            background: #FEF2F2;
            color: var(--danger);
            border-color: var(--danger);
        }

        .toast.info {
            background: #F0F9FF;
            color: var(--info);
            border-color: var(--info);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Nav Group */
        .nav-group {
            margin-top: 0.75rem;
        }

        .nav-group-label {
            font-size: 0.625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-sidebar);
            padding: 0.5rem 0.75rem 0.25rem;
            opacity: 0.6;
        }

        .top-bar-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 0.15rem;
        }

        @media (max-width: 900px) {
            .config-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <script src="auth-guard.js"></script>
</head>

<body>
    <div class="app-container">
<!-- Sidebar -->
<!-- Main Content -->
        <main class="main-content">
<section class="content fade-in" style="animation: fadeIn 0.4s ease-out;">
                <!-- Connection Status -->
                <div class="status-indicator checking" id="statusIndicator">
                    <span class="status-dot pulse"></span>
                    <span id="statusText">Verificando conexión...</span>
                </div>

                <div class="config-layout">
                    <!-- Left: Edit Connection -->
                    <div class="card config-card glass-panel">
                        <div class="config-card-header">
                            <div class="icon primary">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                                </svg>
                            </div>
                            <h3>Parámetros de Conexión</h3>
                        </div>
                        <div class="config-card-body">
                            <div class="form-grid">
                                <div class="form-field">
                                    <label>Servidor</label>
                                    <input type="text" id="inputServer" placeholder="192.168.1.17\SQL2022">
                                </div>
                                <div class="form-field">
                                    <label>Base de Datos</label>
                                    <input type="text" id="inputDatabase" placeholder="BK030226">
                                </div>
                                <div class="form-field">
                                    <label>Usuario</label>
                                    <input type="text" id="inputUser" placeholder="developer1">
                                </div>
                                <div class="form-field">
                                    <label>Contraseña</label>
                                    <div class="input-with-toggle">
                                        <input type="password" id="inputPassword" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢">
                                        <button class="toggle-password" onclick="togglePasswordVisibility()"
                                            title="Mostrar/Ocultar">
                                            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                                stroke="currentColor" stroke-width="2">
                                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                                <circle cx="12" cy="12" r="3"></circle>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button class="btn btn-primary" onclick="testConnection()" id="btnTest">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                                        </svg>
                                        Probar Conexión
                                    </button>
                                    <button class="btn btn-outline" onclick="saveConfig()" id="btnSave">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                                            stroke="currentColor" stroke-width="2">
                                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z">
                                            </path>
                                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                                            <polyline points="7 3 7 8 15 8"></polyline>
                                        </svg>
                                        Guardar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Test Results -->
                    <div class="card config-card glass-panel">
                        <div class="config-card-header">
                            <div class="icon success">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg>
                            </div>
                            <h3>Resultado de Prueba</h3>
                        </div>
                        <div class="config-card-body">
                            <div id="testResultArea">
                                <p
                                    style="color: var(--text-muted); font-size: 0.875rem; text-align: center; padding: 2rem 0;">
                                    Ingrese los datos de conexión y presione <strong>"Probar Conexión"</strong> para
                                    verificar.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        // â”€â”€â”€ Sidebar Toggle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active', sidebar.classList.contains('open'));
        }

        // â”€â”€â”€ Toast â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function showToast(msg, type = 'info') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            c.appendChild(t);
            setTimeout(() => { t.style.animation = 'slideIn 0.3s ease-out reverse forwards'; setTimeout(() => t.remove(), 300); }, 3500);
        }

        // â”€â”€â”€ Init â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentConfig();
            checkStatus();
        });

        // â”€â”€â”€ Load Current Config â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function loadCurrentConfig() {
            try {
                const res = await fetch('/api/config/db');
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();
                document.getElementById('inputServer').value = data.db_server;
                document.getElementById('inputDatabase').value = data.db_name;
                document.getElementById('inputUser').value = data.db_user;
                document.getElementById('inputPassword').placeholder = data.db_password_masked;
            } catch (err) {
                console.error(err);
            }
        }

        // â”€â”€â”€ Check Status â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function checkStatus() {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            const dot = indicator.querySelector('.status-dot');

            indicator.className = 'status-indicator checking';
            dot.classList.add('pulse');
            text.textContent = 'Verificando conexión...';

            try {
                const res = await fetch('/api/config/db/status');
                const data = await res.json();

                dot.classList.remove('pulse');

                if (data.connected) {
                    indicator.className = 'status-indicator connected';
                    text.textContent = 'âœ“ Conexión activa â€” Base de datos operativa';
                } else if (data.error_type === 'password_expired') {
                    indicator.className = 'status-indicator expired';
                    text.textContent = 'âš  Contraseña expirada â€” Ingrese una nueva contraseña y guarde la configuración';
                } else if (data.error_type === 'auth_failed') {
                    indicator.className = 'status-indicator disconnected';
                    text.textContent = 'âœ— Credenciales inválidas â€” Verifique usuario y contraseña';
                } else {
                    indicator.className = 'status-indicator disconnected';
                    text.textContent = `âœ— Sin conexión â€” ${data.message}`;
                }
            } catch (err) {
                dot.classList.remove('pulse');
                indicator.className = 'status-indicator disconnected';
                text.textContent = 'âœ— Error al verificar la conexión';
            }
        }

        // â”€â”€â”€ Toggle Password â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        function togglePasswordVisibility() {
            const input = document.getElementById('inputPassword');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        // â”€â”€â”€ Test Connection â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function testConnection() {
            const server = document.getElementById('inputServer').value;
            const db = document.getElementById('inputDatabase').value;
            const user = document.getElementById('inputUser').value;
            const pwd = document.getElementById('inputPassword').value;

            if (!server || !db || !user || !pwd) {
                showToast('Complete todos los campos, incluyendo la contraseña', 'error');
                return;
            }

            const btn = document.getElementById('btnTest');
            btn.disabled = true;
            btn.textContent = 'Probando...';

            try {
                const res = await fetch('/api/config/db/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ db_server: server, db_name: db, db_user: user, db_password: pwd })
                });
                const data = await res.json();
                renderTestResult(data);
            } catch (err) {
                renderTestResult({ status: 'error', message: 'Error de red al probar la conexión', detail: err.message });
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg> Probar Conexión';
            }
        }

        function renderTestResult(data) {
            const area = document.getElementById('testResultArea');
            const isOk = data.status === 'success';

            let html = `<div class="test-result ${isOk ? 'success' : 'error'}">`;
            html += `<div class="test-result-header">`;
            html += isOk
                ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
                : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
            html += `<span>${data.message}</span></div>`;

            html += '<div class="test-result-body">';
            if (isOk && data.details) {
                html += `<div class="test-detail"><span class="label">Versión SQL</span><span class="value">${data.details.version}</span></div>`;
                html += `<div class="test-detail"><span class="label">Base de Datos</span><span class="value">${data.details.database}</span></div>`;
                html += `<div class="test-detail"><span class="label">Usuario</span><span class="value">${data.details.user}</span></div>`;
                html += `<div class="test-detail"><span class="label">Tablas</span><span class="value">${data.details.tables}</span></div>`;
            } else if (data.detail) {
                html += `<p style="font-size:0.75rem;color:var(--text-muted);word-break:break-word;">${data.detail}</p>`;
            }
            html += '</div></div>';

            area.innerHTML = html;
        }

        // â”€â”€â”€ Save Config â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
        async function saveConfig() {
            const server = document.getElementById('inputServer').value;
            const db = document.getElementById('inputDatabase').value;
            const user = document.getElementById('inputUser').value;
            const pwd = document.getElementById('inputPassword').value;

            if (!server || !db || !user) {
                showToast('Complete al menos servidor, base de datos y usuario', 'error');
                return;
            }

            const payload = { db_server: server, db_name: db, db_user: user };
            if (pwd) payload.db_password = pwd;

            const btn = document.getElementById('btnSave');
            btn.disabled = true;

            try {
                const res = await fetch('/api/config/db', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if (data.status === 'success') {
                    showToast('Configuración guardada exitosamente', 'success');
                    // Re-check status
                    setTimeout(() => checkStatus(), 500);
                    // Reload config
                    await loadCurrentConfig();
                    document.getElementById('inputPassword').value = '';
                } else {
                    showToast('Error al guardar', 'error');
                }
            } catch (err) {
                showToast('Error de red al guardar', 'error');
            } finally {
                btn.disabled = false;
            }
        }
    </script>
    <script src="sidebar.js"></script>
</body>

</html>
