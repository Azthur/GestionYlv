<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Rendiciones - YELAVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.dataTables.min.css"/>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="auth-guard.js"></script>
</head>
<body>
    <div class="app-container">
<main class="main-content" style="padding: 2rem;">
            <div style="background: white; padding: 2rem 3rem; border-radius: 8px; width: 100%; border: 1px solid #e2e8f0; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                    <div>
                        <h2 style="font-size:1.6rem; font-weight:800; color:#1e293b; margin:0;">📋 MI HISTORIAL DE RENDICIONES DE GASTOS</h2>
                        <div style="font-size:0.85rem; color:#64748b; margin-top:5px;">Rendiciones registradas por mi usuario — Exportable a Excel y PDF.</div>
                    </div>
                    <a href="/rendicion_gastos.html" style="background:#2563eb; color:white; padding:10px 20px; border-radius:6px; text-decoration:none; font-weight:bold; font-size:0.85rem;">+ Nueva Rendición</a>
                </div>

                <div style="background:#f1f5f9; padding:12px; border-radius:8px; margin-bottom:20px; display:flex; align-items:center; gap:15px; border:1px solid #e2e8f0;">
                    <label style="font-weight:700; color:#334155;">EMPRESA:</label>
                    <select id="selFiltroCia" onchange="cargarHistorial()" style="padding:8px; width:300px; border-radius:4px; border:1px solid #cbd5e1; font-family:'Inter',sans-serif;">
                    </select>
                </div>

                <table id="tablaHistorial" class="display" style="width:100%; font-size:0.85rem;">
                    <thead>
                        <tr>
                            <th>FECHA EMISIÓN</th>
                            <th>NRO RENDICIÓN</th>
                            <th>TRABAJADOR/SOCIO</th>
                            <th>TOTAL GASTADO</th>
                            <th>USUARIO</th>
                            <th>ESTADO</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyHistorial"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api";
        let tbl;

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const res = await axios.get(`${API_URL}/finanzas/empresas`);
                const sel = document.getElementById("selFiltroCia");
                res.data.forEach(e => {
                    const opt = document.createElement("option");
                    opt.value = e.codcia;
                    opt.textContent = `${e.codcia} - ${e.nomcia}`;
                    sel.appendChild(opt);
                });
                const cu = JSON.parse(localStorage.getItem('yelave_user') || '{}');
                sel.value = cu.codcia || '003';
            } catch(e) { console.error(e); }

            tbl = $('#tablaHistorial').DataTable({
                dom: 'Bfrtip',
                buttons: ['excelHtml5', 'pdfHtml5'],
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' },
                order: [[0, 'desc']],
                pageLength: 25
            });
            cargarHistorial();
        });

        async function cargarHistorial() {
            try {
                const cu = JSON.parse(localStorage.getItem('yelave_user') || '{}');
                const username = cu.username || "SISTEMA";
                const codcia = document.getElementById("selFiltroCia").value || "003";
                
                const res = await axios.get(`${API_URL}/finanzas/rendiciones?codcia=${codcia}`);
                const myData = res.data.filter(x => x.UsuarioRegistro === username);

                tbl.clear();
                myData.forEach(h => {
                    const url = `${window.location.origin}/visor_rendicion.html?uuid=${h.UuidLink}`;
                    let badge = '';
                    let actionHtml = `<a href="${url}" target="_blank" style="color:#2563eb; font-weight:bold; border:1px solid #2563eb; padding:4px 8px; border-radius:4px; text-decoration:none;">👁 Ver PDF</a>`;

                    if (h.FechaAprobacion) {
                        badge = '<span style="padding:3px 8px; border-radius:4px; background:#dcfce7; color:#166534; font-weight:bold; font-size:0.75rem;">APROBADO</span>';
                    } else {
                        badge = '<span style="padding:3px 8px; border-radius:4px; background:#fef08a; color:#854d0e; font-weight:bold; font-size:0.75rem;">PENDIENTE</span>';
                        actionHtml += ` <a href="/rendicion_gastos.html?id=${h.Id}" style="color:#059669; font-weight:bold; border:1px solid #059669; padding:4px 8px; border-radius:4px; text-decoration:none;">✏️ Editar</a>`;
                    }
                    
                    tbl.row.add([
                        h.Fecha || '',
                        h.NroRendicion || '',
                        h.NomAux || '',
                        `S/ ${(h.TotalGastado || 0).toFixed(2)}`,
                        h.UsuarioRegistro || '',
                        badge,
                        actionHtml
                    ]);
                });
                tbl.draw();
            } catch(e) { console.error(e); }
        }
    </script>
    <script src="sidebar.js"></script>
</body>
</html>
