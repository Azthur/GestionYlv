<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes Kardex - YELAVE ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
        }

        .navbar-glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .table-dark-glass {
            --bs-table-bg: transparent;
            --bs-table-color: #f8fafc;
            --bs-table-border-color: var(--glass-border);
        }

        .btn-custom {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            color: white;
        }

        /* SUNAT FORMATS CSS */
        .col-fisico { background-color: rgba(59, 130, 246, 0.1) !important; }
        .col-valorizado { background-color: rgba(16, 185, 129, 0.1) !important; }
        .col-saldos { background-color: rgba(245, 158, 11, 0.1) !important; }
        
        .table-responsive {
            max-height: 70vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <!-- Traceability Modal -->
    <div class="modal fade" id="traceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-panel" style="background: rgba(15, 17, 30, 0.95); border: 1px solid rgba(255,255,255,0.1);">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title" style="color: #a855f7;">Trazabilidad del Movimiento</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="traceModalContent">
                    <div class="loader" id="traceLoader" style="display:none; margin: 20px auto;"></div>
                    <div id="traceData"></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-layer-group me-2"></i>YELAVE ERP
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="kardex.html">Kardex</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0">
                    <i class="fas fa-boxes me-2 text-primary"></i>Reportes Kardex
                </h2>
                <p class="text-secondary mb-0">Generador de Formatos SUNAT 12.1 y 13.1</p>
            </div>
            <div>
                <button class="btn btn-outline-light me-2" onclick="window.print()">
                    <i class="fas fa-print me-2"></i>Imprimir
                </button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="glass-card p-4 mb-4">
            <form id="kardexForm" class="row g-3">
                <div class="col-md-2">
                    <label class="form-label">Empresa</label>
                    <select class="form-select bg-dark text-light" id="empresa" required>
                        <!-- Cargado por JS -->
                    </select>
                </div>
                
                <div class="col-md-2">
                    <label class="form-label">Formato SUNAT</label>
                    <select class="form-select bg-dark text-light" id="formato" required>
                        <option value="12.1">12.1 (Físico)</option>
                        <option value="13.1">13.1 (Valorizado)</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Fecha Inicio</label>
                    <input type="date" class="form-control bg-dark text-light" id="fechaInicio" required>
                </div>
                
                <div class="col-md-2">
                    <label class="form-label">Fecha Fin</label>
                    <input type="date" class="form-control bg-dark text-light" id="fechaFin" required>
                </div>

                <div class="col-md-2">
                    <label class="form-label">Cód. Mat. (Desde)</label>
                    <input type="text" class="form-control bg-dark text-light" id="codMatDesde" placeholder="Opcional">
                </div>

                <div class="col-md-2">
                    <label class="form-label">Cód. Mat. (Hasta)</label>
                    <input type="text" class="form-control bg-dark text-light" id="codMatHasta" placeholder="Opcional">
                </div>

                <div class="col-12 d-flex justify-content-end">
                    <button type="submit" class="btn btn-custom px-4">
                        <i class="fas fa-search me-2"></i>Generar Reporte
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabs -->
        <div class="mb-2">
            <ul class="nav nav-tabs border-bottom-0" id="reportesTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-top fw-bold" style="color:#fff; background: rgba(59, 130, 246, 0.2); border-color: rgba(255,255,255,0.1);" id="kardex-tab" data-bs-toggle="tab" data-bs-target="#tab-kardex" type="button" role="tab">Kardex SUNAT</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-top text-white" style="border-color: transparent;" id="stock-tab" data-bs-toggle="tab" data-bs-target="#tab-stock" type="button" role="tab">Reporte Stock</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-top text-white" style="border-color: transparent;" id="costo-tab" data-bs-toggle="tab" data-bs-target="#tab-costo" type="button" role="tab">Costo de Ventas</button>
                </li>
            </ul>
        </div>

        <!-- Resultados -->
        <div class="glass-card p-4 rounded-end rounded-bottom" id="resultadosContainer" style="display: none; animation: slideUp 0.5s ease-out; background: rgba(59, 130, 246, 0.05);">
            <div class="d-flex justify-content-end mb-3">
                <button class="btn btn-outline-success btn-sm" onclick="exportKardexToExcel()">
                    <i class="fas fa-file-excel me-2"></i>Exportar a Excel
                </button>
            </div>
            
            <div id="loader" class="text-center py-5" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2 text-light">Procesando movimientos...</p>
            </div>

            <div class="tab-content" id="reportesTabsContent">
                <!-- Kardex -->
                <div class="tab-pane fade show active" id="tab-kardex" role="tabpanel" tabindex="0">
                    <div id="reporteContent" class="kardex-report-print"></div>
                </div>
                
                <!-- Stock -->
                <div class="tab-pane fade" id="tab-stock" role="tabpanel" tabindex="0">
                    <div id="stockContent" class="kardex-report-print"></div>
                </div>
                
                <!-- Costo Ventas -->
                <div class="tab-pane fade" id="tab-costo" role="tabpanel" tabindex="0">
                    <div id="costoContent" class="kardex-report-print"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/kardex.js?v=3.0"></script>
</body>
</html>
