<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YELAVE - Movimientos de Almacén</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.2/css/buttons.dataTables.min.css">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        /* ─── Filter Bar ─── */
        .filter-bar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            background: var(--bg-card);
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-width: 140px;
        }

        .filter-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select,
        .filter-group input {
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-sm);
            background: #FFFFFF;
            font-family: var(--font);
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        /* ─── Badges ─── */
        .badge {
            padding: 0.25rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }

        .badge.approved {
            background: #dcfce7;
            color: #166534;
        }

        .badge.pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .badge.canceled {
            background: #fee2e2;
            color: #991b1b;
        }

        /* ─── DataTable customization ─── */
        .dataTables_wrapper {
            font-family: 'Inter', sans-serif;
        }

        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-sm);
            padding: 0.4rem 0.75rem;
            font-size: 0.8125rem;
            font-family: 'Inter', sans-serif;
        }

        .dataTables_wrapper .dataTables_length select {
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-sm);
            padding: 0.3rem 0.5rem;
            font-size: 0.8125rem;
        }

        .dataTables_wrapper .dataTables_info {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button {
            border-radius: var(--radius-sm) !important;
            font-size: 0.8rem;
            padding: 0.3rem 0.65rem !important;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: var(--primary) !important;
            color: #fff !important;
            border-color: var(--primary) !important;
        }

        table.dataTable thead th {
            background: #f1f5f9;
            color: #334155;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 2px solid #cbd5e1 !important;
        }

        table.dataTable tbody td {
            font-size: 0.8125rem;
            padding: 0.65rem 0.75rem !important;
            vertical-align: middle;
        }

        table.dataTable tbody tr:hover {
            background: #f0f7ff !important;
        }

        table.dataTable {
            border-bottom: 1px solid #e2e8f0 !important;
        }

        /* Sticky Column */
        table.dataTable thead th.sticky-col-left {
            position: sticky;
            left: 0;
            z-index: 11 !important;
        }

        table.dataTable tbody td.sticky-col-left {
            position: sticky;
            left: 0;
            z-index: 9 !important;
            background-color: #fff;
            border-right: 1px solid #e2e8f0;
        }

        table.dataTable tbody tr:nth-child(even) td.sticky-col-left {
            background-color: #f8fafc;
        }

        table.dataTable tbody tr:hover td.sticky-col-left {
            background-color: #f0f7ff !important;
        }

        /* Action Dropdown Item Button */
        .btn-ver-voucher {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: #fff;
            cursor: pointer;
            transition: all 0.15s;
            color: #16a34a;
        }

        .btn-ver-voucher:hover {
            background: #f0fdf4;
            border-color: #16a34a;
            box-shadow: 0 2px 6px rgba(22, 163, 74, 0.15);
        }

        /* ─── Report Modal Styles ─── */
        .report-header-band {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding-bottom: 1.25rem;
            margin-bottom: 1.25rem;
            border-bottom: 3px solid #1e3a5f;
        }

        .report-company-info h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1e3a5f;
            margin: 0 0 0.15rem 0;
        }

        .report-company-info p {
            font-size: 0.75rem;
            color: #6b7280;
            margin: 0;
            line-height: 1.4;
        }

        .report-oc-badge {
            text-align: right;
            background: #1e3a5f;
            color: #fff;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            min-width: 200px;
        }

        .report-oc-badge .oc-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.8;
        }

        .report-oc-badge .oc-number {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0.15rem 0;
        }

        .report-oc-badge .oc-date {
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.9;
        }

        .report-supplier-box {
            display: grid;
            grid-template-columns: 110px 1fr 110px 1fr;
            gap: 0.25rem 0.5rem;
            font-size: 0.775rem;
            padding: 0.85rem 1rem;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-bottom: 1.25rem;
        }

        .report-supplier-box .lbl {
            font-weight: 600;
            color: #64748b;
        }

        .report-supplier-box .val {
            color: #0f172a;
        }

        .report-supplier-box .val-full {
            color: #0f172a;
            grid-column: span 3;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0.25rem;
        }

        .report-table th {
            background: #e2e8f0;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #334155;
            padding: 0.4rem 0.4rem !important;
            border: 1px solid #cbd5e1;
            text-align: left;
            position: relative !important; /* Desactivar sticky que desalinea horizontalmente */
        }

        .report-table td {
            border: 1px solid #e2e8f0;
            padding: 0.4rem 0.4rem !important;
            font-size: 0.775rem;
            vertical-align: top;
        }

        .report-table td:nth-child(3) {
            white-space: normal !important;
            word-break: break-word;
            min-width: 220px;
            max-width: 380px;
        }

        #voucherPrintContent {
            max-width: 100%;
            overflow-x: auto;
        }

        .report-table tbody tr:nth-child(even) {
            background: #fafbfc;
        }

        .report-totals-box {
            display: flex;
            justify-content: flex-end;
            margin-top: 0.75rem;
        }

        .report-totals-box table {
            border-collapse: collapse;
            min-width: 300px;
        }

        .report-totals-box td {
            padding: 0.35rem 0.85rem;
            font-size: 0.825rem;
        }

        /* Watermarks */
        .watermark-container {
            position: relative;
        }

        .watermark-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            opacity: 0.12;
            width: 100%;
            text-align: center;
        }

        .wm-anulado { color: #ef4444; }
        .wm-completo { color: #22c55e; }

        .content {
            max-width: none !important;
            width: 100% !important;
        }

        @media print {
            body * {
                visibility: hidden;
            }

            .modal-overlay.active,
            .modal-overlay.active * {
                visibility: visible;
            }

            .modal-overlay.active {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: auto;
                background: white !important;
            }

            #voucherPrintContent {
                position: relative;
                width: 100%;
                padding: 0 !important;
                display: block !important;
            }

            .modal.glass-modal {
                box-shadow: none !important;
                border: none !important;
                background: none !important;
                width: 100% !important;
                max-width: none !important;
                margin: 0 !important;
            }

            .modal-body {
                max-height: none !important;
                overflow: visible !important;
            }

            .sidebar,
            .top-bar,
            .filter-bar,
            .modal-header,
            .close-btn {
                display: none !important;
            }
        }
    </style>
    <script src="auth-guard.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar and Topbar are injected dynamically via sidebar.js -->
        <main class="main-content">
            <section class="content fade-in">
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-group" style="flex: 2;">
                        <label for="filterCia">Empresa</label>
                        <select id="filterCia">
                            <option value="">Cargando empresas...</option>
                        </select>
                    </div>
                    <div class="filter-group" style="flex: 1;">
                        <label for="filterYear">Año</label>
                        <select id="filterYear">
                            <option value="0">(Todos)</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026" selected>2026</option>
                        </select>
                    </div>
                    <div class="filter-group" style="flex: 1;">
                        <label for="filterPeriod">Periodo (Mes)</label>
                        <select id="filterPeriod">
                            <option value="0">(Todos)</option>
                            <option value="1">Enero</option>
                            <option value="2">Febrero</option>
                            <option value="3">Marzo</option>
                            <option value="4">Abril</option>
                            <option value="5">Mayo</option>
                            <option value="6">Junio</option>
                            <option value="7">Julio</option>
                            <option value="8">Agosto</option>
                            <option value="9">Septiembre</option>
                            <option value="10">Octubre</option>
                            <option value="11">Noviembre</option>
                            <option value="12">Diciembre</option>
                        </select>
                    </div>
                    <div class="filter-group" style="flex: 1.5;">
                        <label for="filterType">Tipo de Movimiento</label>
                        <select id="filterType">
                            <option value="">(Todos)</option>
                            <option value="I">Ingresos (I)</option>
                            <option value="S">Salidas (S)</option>
                        </select>
                    </div>
                    <div class="filter-group" style="flex: 2.5;">
                        <label for="filterSearch">🔎 Buscar por Documento / O.C. / Auxiliar</label>
                        <input type="text" id="filterSearch" placeholder="Ej: 00000190, Botica, RUC..." onkeyup="if(event.key==='Enter') loadMovements()">
                    </div>
                    <div class="filter-group" style="flex: 1; flex-direction: row; gap: 0.5rem; justify-content: flex-end; align-items: flex-end;">
                        <button class="btn btn-primary" onclick="loadMovements()" style="height:36px; padding:0 1.5rem; font-size:0.8rem; font-weight:600; width: 100%;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14" style="margin-right:0.3rem">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>Consultar
                        </button>
                    </div>
                </div>

                <!-- DataTable Card -->
                <div class="card glass-panel" style="padding: 1.25rem;">
                    <div id="tableWrapper" style="display:none; overflow-x: auto;">
                        <table id="movementsTable" class="display nowrap" style="width:100%">
                            <thead>
                                <tr>
                                    <th class="sticky-col-left" style="width: 50px; text-align: center;">Ver</th>
                                    <th style="text-align: center;">Estado</th>
                                    <th>N° Documento</th>
                                    <th>Fecha</th>
                                    <th>Almacén</th>
                                    <th>Operación / Tipo Movimiento</th>
                                    <th>Auxiliar (Proveedor/Cliente)</th>
                                    <th>O. Compra</th>
                                    <th>Usuario</th>
                                    <th>Glosa / Observación</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                    <div id="initialMessage" style="text-align:center; padding: 4rem; color: var(--text-muted); font-size: 0.9rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" style="margin-bottom:1rem; opacity:0.4;">
                            <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                        </svg>
                        <br>Seleccione una empresa activa y haga clic en <strong>Consultar</strong>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal: Warehouse Movement Voucher -->
    <div class="modal-overlay" id="voucherModal">
        <div class="modal glass-modal" style="max-width:950px; width:95%;">
            <div class="modal-header" style="justify-content:space-between; border-bottom: 1px solid var(--border); padding-bottom: 0.8rem;">
                <h3>Voucher de Movimiento de Almacén</h3>
                <div style="display:flex; gap:0.5rem; align-items:center;">
                    <button id="btnCopyPublicUrl" class="btn btn-outline" onclick="copyPublicUrl()" style="padding:0.35rem 0.75rem; font-size:0.775rem; display: inline-flex; align-items:center; gap:0.3rem; color: var(--primary); border-color: var(--primary);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                        </svg>Copiar Enlace
                    </button>
                    <button class="btn btn-outline" onclick="printVoucher()" style="padding:0.35rem 0.75rem; font-size:0.775rem; display: inline-flex; align-items:center; gap:0.3rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                            <polyline points="6 9 6 2 18 2 18 9"></polyline>
                            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                            <rect x="6" y="14" width="12" height="8"></rect>
                        </svg>Imprimir
                    </button>
                    <button class="close-btn" onclick="closeVoucherModal()" style="background:transparent; border:none; cursor:pointer; color:var(--text-muted);">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="modal-body" style="max-height:80vh; overflow-y:auto; padding:0; background:#f8fafc;">
                <div id="voucherPrintContent">
                    <div id="voucherLoading" style="text-align:center; padding:4rem; color:var(--text-muted); font-size:0.9rem;">
                        Consultando detalle del movimiento...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="movimientos_almacen.js"></script>
</body>
</html>
